<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#0f1729;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060d1a;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00b0ff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#00b0ff;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dropshadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00b0ff" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2f52"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc"/>
      <stop offset="100%" style="stop-color:#003d8a"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b0ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0055aa;stop-opacity:0.3"/>
    </linearGradient>
    <marker id="dot" markerWidth="4" markerHeight="4" refX="2" refY="2">
      <circle cx="2" cy="2" r="1.5" fill="#00b0ff" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="16"/>
  
  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#00b0ff" stroke-width="0.5">
    <line x1="0" y1="62" x2="900" y2="62"/>
    <line x1="0" y1="124" x2="900" y2="124"/>
    <line x1="0" y1="186" x2="900" y2="186"/>
    <line x1="0" y1="248" x2="900" y2="248"/>
